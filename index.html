<script>
var bridgeReady=false,pending={},bf=document.getElementById('bridge');

function gcc(id){var c=S.cats.find(function(x){return x.id===id;});return c?'var('+c.color+')':'var(--cx)';}
function gcr(id){var s=getComputedStyle(document.documentElement);var c=S.cats.find(function(x){return x.id===id;});return s.getPropertyValue(c?c.color:'--cx').trim();}
function gn(id){var c=S.cats.find(function(x){return x.id===id;});return c?c.name:id;}
function rCS(){document.getElementById('iCt').innerHTML=S.cats.map(function(c){return '<option value="'+c.id+'">'+(c.icon||'\u{1F4C1}')+' '+c.name+'</option>';}).join('');}
function rCL(){document.getElementById('cL').innerHTML=S.cats.map(function(c){return '<div class="cti '+(c.default?'df':'')+'"><div class="dot" style="background:var('+c.color+')"></div><span class="cn">'+(c.icon||'\u{1F4C1}')+' '+c.name+'</span><button class="cx" onclick="rmC(\''+c.id+'\')">x</button></div>';}).join('');}
function addC(){var i=document.getElementById('iNC'),n=i.value.trim();if(!n)return;S.cats.push({id:'c_'+Date.now(),name:n,icon:'\u{1F4C1}',color:'--cx',default:false});i.value='';sav();rCS();rCL();api('saveCategories',S.cats);toast('Добавена!');}
function rmC(id){S.cats=S.cats.filter(function(c){return c.id!==id;});sav();rCS();rCL();api('saveCategories',S.cats);}
function setCur(){S.cur=document.getElementById('iCr').value;sav();render();toast('Валута: '+S.cur);}
function addE(){var a=parseFloat(document.getElementById('iA').value),d=document.getElementById('iD').value.trim(),dt=document.getElementById('iDt').value,ct=document.getElementById('iCt').value;if(!a||a<=0){document.getElementById('iA').focus();return;}if(!d){document.getElementById('iD').focus();return;}if(!dt){document.getElementById('iDt').focus();return;}var btn=document.getElementById('aBtn');btn.disabled=true;btn.textContent='...';api('add',{amount:a,desc:d,date:dt,cat:ct}).then(function(){return api('get');}).then(function(r){S.e=r.expenses||[];sav();var dd=new Date(dt);cM=dd.getMonth();cY=dd.getFullYear();render();btn.disabled=false;btn.innerHTML='&#10133; Добави';document.getElementById('iA').value='';document.getElementById('iD').value='';toast('Добавен!');}).catch(function(){btn.disabled=false;btn.innerHTML='&#10133; Добави';toast('Грешка!','er');});}
function delE(r){if(!confirm('Изтрий?'))return;api('delete',r).then(function(){return api('get');}).then(function(res){S.e=res.expenses||[];sav();render();toast('Изтрит!');}).catch(function(){toast('Грешка!','er');});}
function savB(){var v=parseFloat(document.getElementById('iB').value);if(!v||v<=0)return;S.bud=v;sav();render();api('saveBudget',v);toast('Запазен!');}
function xCSV(){var x=mex(cM,cY);if(!x.length)return toast('Няма!','er');var csv='\uFEFF"Дата","Описание","Категория","Сума"\n';x.forEach(function(e){csv+='"'+e.date+'","'+e.desc+'","'+gn(e.cat)+'","'+e.amount.toFixed(2)+'"\n';});dlF(csv,'razkhodi_'+mk(cM,cY)+'.csv');}
function xAll(){if(!S.e.length)return toast('Няма!','er');var csv='\uFEFF"Дата","Описание","Категория","Сума"\n';S.e.forEach(function(e){csv+='"'+e.date+'","'+e.desc+'","'+gn(e.cat)+'","'+e.amount.toFixed(2)+'"\n';});dlF(csv,'razkhodi_all.csv');}
function dlF(c,f){var b=new Blob([c],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=f;a.click();}
function go(t){document.querySelectorAll('.tab').forEach(function(e){e.classList.remove('on');});document.querySelectorAll('.nb').forEach(function(e){e.classList.remove('on');});document.getElementById('t-'+t).classList.add('on');document.getElementById('n-'+t).classList.add('on');if(t==='cmp')rCmp();if(t==='home')setTimeout(rCh,40);window.scrollTo(0,0);}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fD(d){if(!d)return'';var p=d.split('-');return p[2]+'.'+p[1];}
function render(){document.getElementById('mL').textContent=MB[cM]+' '+cY;var td=new Date();document.getElementById('iDt').value=(cM===td.getMonth()&&cY===td.getFullYear())?td.toISOString().slice(0,10):cY+'-'+String(cM+1).padStart(2,'0')+'-01';document.getElementById('iCr').value=S.cur;var ex=mex(cM,cY),tot=ex.reduce(function(s,e){return s+e.amount;},0),c=cu();document.getElementById('vS').textContent=tot.toFixed(2)+' '+c;document.getElementById('vC').textContent=ex.length;document.getElementById('vB').textContent=S.bud;document.getElementById('vBC').textContent=S.cur;document.getElementById('iB').placeholder=S.bud;var rem=S.bud-tot,re=document.getElementById('vR');re.textContent=rem.toFixed(2)+' '+c;re.className='cv '+(rem<0?'r':'g');var pct=Math.min((tot/S.bud)*100,100);document.getElementById('vP').textContent=pct.toFixed(0)+'%';var f=document.getElementById('vF');f.style.width=pct+'%';f.style.background=pct>90?'var(--red)':pct>70?'var(--wrn)':'var(--grn)';var el=document.getElementById('eL');document.getElementById('eT').textContent='Разходи ('+ex.length+')';if(!ex.length){el.innerHTML='<div class="emp"><div class="em">&#128184;</div><p>Няма разходи за '+MB[cM]+'.</p></div>';}else{el.innerHTML=ex.map(function(e){return '<div class="ei"><div class="dot" style="background:'+gcc(e.cat)+'"></div><div class="ei-i"><div class="ei-d">'+esc(e.desc)+'</div><div class="ei-m"><span>'+gn(e.cat)+'</span><span>'+fD(e.date)+'</span></div></div><div class="ei-a">'+e.amount.toFixed(2)+' '+c+'</div><button class="ei-x" onclick="delE('+e.row+')">x</button></div>';}).join('');}rCS();rCL();rCh();}
function rCh(){var ex=mex(cM,cY),tc=getComputedStyle(document.documentElement).getPropertyValue('--t1').trim(),gc=getComputedStyle(document.documentElement).getPropertyValue('--grid').trim();var ct={};S.cats.forEach(function(c){ct[c.id]=0;});ex.forEach(function(e){ct[e.cat]=(ct[e.cat]||0)+e.amount;});var ac=Object.entries(ct).filter(function(x){return x[1]>0;});if(h1)h1.destroy();h1=new Chart(document.getElementById('c1'),{type:'doughnut',data:{labels:ac.map(function(x){return gn(x[0]);}),datasets:[{data:ac.map(function(x){return x[1];}),backgroundColor:ac.map(function(x){return gcr(x[0]);}),borderWidth:0}]},options:{responsive:true,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:tc,padding:8,font:{size:10}}},tooltip:{callbacks:{label:function(c){return c.label+': '+c.parsed.toFixed(2)+' '+cu();}}}}}});var bl=[],bd=[];for(var i=2;i>=0;i--){var m=cM-i,y=cY;if(m<0){m+=12;y--;}bl.push(MB[m].slice(0,3));bd.push(mex(m,y).reduce(function(s,e){return s+e.amount;},0));}if(h2)h2.destroy();h2=new Chart(document.getElementById('c2'),{type:'bar',data:{labels:bl,datasets:[{data:bd,backgroundColor:[gcr('bills'),gcr('fun'),gcr('food')],borderRadius:4,barThickness:32}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y.toFixed(2)+' '+cu();}}}},scales:{y:{beginAtZero:true,grid:{color:gc},ticks:{color:tc,font:{size:9}}},x:{grid:{display:false},ticks:{color:tc,font:{size:10}}}}}});}
function rCmp(){var pm=cM-1,py=cY;if(pm<0){pm=11;py--;}var ce=mex(cM,cY),pe=mex(pm,py),c=cu();var ct=ce.reduce(function(s,e){return s+e.amount;},0),pt=pe.reduce(function(s,e){return s+e.amount;},0);var h='<div class="cr" style="font-weight:700;border-bottom:2px solid var(--brd)"><span>Категория</span><div class="crv"><span style="width:50px;text-align:right">'+MB[pm].slice(0,3)+'</span><span style="width:50px;text-align:right">'+MB[cM].slice(0,3)+'</span><span style="width:40px;text-align:right">+/-</span></div></div>';S.cats.forEach(function(cat){var p=pe.filter(function(e){return e.cat===cat.id;}).reduce(function(s,e){return s+e.amount;},0);var cr=ce.filter(function(e){return e.cat===cat.id;}).reduce(function(s,e){return s+e.amount;},0);var d=cr-p;if(!p&&!cr)return;h+='<div class="cr"><div class="crc"><div class="dot" style="background:var('+cat.color+')"></div>'+cat.name+'</div><div class="crv"><span style="width:50px;text-align:right">'+p.toFixed(0)+'</span><span style="width:50px;text-align:right">'+cr.toFixed(0)+'</span><span class="crd '+(d>0?'up':d<0?'dn':'')+'" style="width:40px;text-align:right">'+(d>0?'+':'')+d.toFixed(0)+'</span></div></div>';});var td=ct-pt;h+='<div class="cr" style="font-weight:700;border-top:2px solid var(--brd);padding-top:8px"><span>ОБЩО</span><div class="crv"><span style="width:50px;text-align:right">'+pt.toFixed(0)+'</span><span style="width:50px;text-align:right">'+ct.toFixed(0)+'</span><span class="crd '+(td>0?'up':td<0?'dn':'')+'" style="width:40px;text-align:right">'+(td>0?'+':'')+td.toFixed(0)+'</span></div></div>';document.getElementById('cmpC').innerHTML=h;var tc2=getComputedStyle(document.documentElement).getPropertyValue('--t1').trim(),gc2=getComputedStyle(document.documentElement).getPropertyValue('--grid').trim();var tl=[],td2=[];for(var i=5;i>=0;i--){var m=cM-i,y=cY;while(m<0){m+=12;y--;}tl.push(MB[m].slice(0,3));td2.push(mex(m,y).reduce(function(s,e){return s+e.amount;},0));}if(h3)h3.destroy();h3=new Chart(document.getElementById('c3'),{type:'line',data:{labels:tl,datasets:[{data:td2,borderColor:gcr('fun'),backgroundColor:gcr('fun')+'22',fill:true,tension:.4,pointRadius:3}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y.toFixed(2)+' '+cu();}}}},scales:{y:{beginAtZero:true,grid:{color:gc2},ticks:{color:tc2,font:{size:9}}},x:{grid:{display:false},ticks:{color:tc2,font:{size:10}}}}}});}
setTh(localStorage.getItem('dt_th')||'cyberpunk');if(ld())render();else render();setTimeout(function(){if(!bridgeReady){pil('er');}},10000);
</script>
