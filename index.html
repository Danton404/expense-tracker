<!DOCTYPE html>
<html lang="bg" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DT Tracker">
  <meta name="theme-color" content="#0a0a0f">
  <title>DT Expense Tracker</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMjAgMTIwIj48cmVjdCB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgcng9IjI0IiBmaWxsPSIjMGEwYTBmIi8+PHRleHQgeD0iNjAiIHk9Ijc2IiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iNTAiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjMDBmZmNjIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5EVDwvdGV4dD48L3N2Zz4=">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root, [data-theme="light"] {
      --bg-primary: #f5f5f7;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-input: #f0f0f3;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-muted: #aeaeb2;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --accent-rgb: 0,113,227;
      --danger: #ff3b30;
      --danger-hover: #d63028;
      --success: #34c759;
      --warning: #ff9500;
      --border: #d2d2d7;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Space Grotesk', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --cat-food: #ff6b6b;
      --cat-car: #ffa726;
      --cat-bills: #42a5f5;
      --cat-fun: #ab47bc;
      --cat-custom: #26a69a;
      --overlay: rgba(0,0,0,0.3);
      --chart-grid: rgba(0,0,0,0.06);
    }

    [data-theme="cyberpunk"] {
      --bg-primary: #0a0a0f;
      --bg-secondary: #0f0f1a;
      --bg-card: #12121f;
      --bg-input: #1a1a2f;
      --text-primary: #e0e0ff;
      --text-secondary: #8888bb;
      --text-muted: #555580;
      --accent: #00ffcc;
      --accent-hover: #00ddaa;
      --accent-rgb: 0,255,204;
      --danger: #ff0055;
      --danger-hover: #cc0044;
      --success: #00ff88;
      --warning: #ffaa00;
      --border: #2a2a4a;
      --shadow: 0 0 20px rgba(0,255,204,0.08);
      --shadow-lg: 0 0 40px rgba(0,255,204,0.12);
      --radius: 4px;
      --radius-sm: 2px;
      --font: 'JetBrains Mono', monospace;
      --font-mono: 'JetBrains Mono', monospace;
      --cat-food: #ff4466;
      --cat-car: #ffbb33;
      --cat-bills: #33bbff;
      --cat-fun: #cc44ff;
      --cat-custom: #00ffaa;
      --overlay: rgba(0,0,0,0.7);
      --chart-grid: rgba(255,255,255,0.06);
    }

    [data-theme="glass"] {
      --bg-primary: #dde0e8;
      --bg-secondary: rgba(255,255,255,0.35);
      --bg-card: rgba(255,255,255,0.4);
      --bg-input: rgba(255,255,255,0.5);
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a6a;
      --text-muted: #7a7a9a;
      --accent: #6c63ff;
      --accent-hover: #5a52ee;
      --accent-rgb: 108,99,255;
      --danger: #ff4757;
      --danger-hover: #dd3344;
      --success: #2ed573;
      --warning: #ffa502;
      --border: rgba(255,255,255,0.6);
      --shadow: 0 8px 32px rgba(100,100,160,0.12);
      --shadow-lg: 0 12px 48px rgba(100,100,160,0.18);
      --radius: 20px;
      --radius-sm: 14px;
      --font: 'Nunito', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --cat-food: #ff6b81;
      --cat-car: #ffa726;
      --cat-bills: #54a0ff;
      --cat-fun: #a55eea;
      --cat-custom: #1dd1a1;
      --overlay: rgba(100,100,160,0.3);
      --chart-grid: rgba(0,0,0,0.06);
    }

    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100%;
      min-height: 100dvh;
      line-height: 1.5;
      transition: background 0.4s, color 0.3s;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding-bottom: 80px;
    }

    [data-theme="glass"] body {
      background: linear-gradient(135deg, #c3cfe2 0%, #dde0e8 30%, #e8cfe2 60%, #cfe2d4 100%);
      background-attachment: fixed;
    }

    [data-theme="cyberpunk"] body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,204,0.015) 2px, rgba(0,255,204,0.015) 4px);
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-primary);
      transition: background 0.4s;
    }
    [data-theme="glass"] .header {
      background: transparent;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      margin: 0 -16px;
      padding: 16px 16px 8px;
    }

    .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    [data-theme="cyberpunk"] .logo span { text-shadow: 0 0 10px rgba(0,255,204,0.6); }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .sync-indicator {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sync-indicator.syncing { background: rgba(var(--accent-rgb),0.15); color: var(--accent); }
    .sync-indicator.synced { background: rgba(52,199,89,0.15); color: var(--success); }
    .sync-indicator.error { background: rgba(255,59,48,0.15); color: var(--danger); }
    .sync-dot {
      width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    }
    .sync-indicator.syncing .sync-dot { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .theme-switcher {
      display: flex;
      gap: 4px;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      padding: 3px;
    }
    .theme-switcher button {
      background: none;
      border: none;
      font-size: 16px;
      padding: 5px 8px;
      border-radius: calc(var(--radius-sm) - 2px);
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1;
    }
    .theme-switcher button.active {
      background: var(--bg-card);
      box-shadow: var(--shadow);
    }
    [data-theme="glass"] .theme-switcher {
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px 0;
    }
    .month-nav button {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .month-nav button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .month-label { font-size: 17px; font-weight: 600; min-width: 160px; text-align: center; }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
    }
    [data-theme="glass"] .summary-card {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
    }
    .summary-card.full { grid-column: 1 / -1; }
    .summary-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .summary-value {
      font-size: 26px;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: -1px;
    }
    .summary-value.danger { color: var(--danger); }
    .summary-value.success { color: var(--success); }

    .budget-bar { margin-top: 10px; height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
    .budget-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease, background 0.3s; }

    .add-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    [data-theme="glass"] .add-section {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
    }
    .add-section h3 { font-size: 15px; margin-bottom: 14px; font-weight: 600; }

    .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .form-row.triple { display: grid; grid-template-columns: 1fr 1.2fr 1fr; }

    .input-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .input-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    input, select {
      font-family: var(--font);
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      width: 100%;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(var(--accent-rgb),0.15); }
    select { cursor: pointer; -webkit-appearance: none; appearance: none; }

    .btn {
      font-family: var(--font);
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: var(--danger-hover); }
    .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-outline:hover:not(:disabled) { background: rgba(var(--accent-rgb), 0.08); }
    .btn-sm { padding: 8px 14px; font-size: 13px; width: auto; }

    [data-theme="cyberpunk"] .btn-primary {
      box-shadow: 0 0 12px rgba(0,255,204,0.3);
      text-shadow: 0 0 6px rgba(0,255,204,0.5);
    }

    .expense-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

    .expense-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      transition: all 0.2s;
      animation: slideIn 0.3s ease;
    }
    [data-theme="glass"] .expense-item {
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
    }
    .expense-item:hover { transform: translateX(4px); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .expense-info { flex: 1; min-width: 0; }
    .expense-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 8px; }

    .expense-amount { font-family: var(--font-mono); font-size: 15px; font-weight: 600; white-space: nowrap; }

    .expense-delete {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 18px; padding: 4px; border-radius: 6px; transition: all 0.2s; line-height: 1;
    }
    .expense-delete:hover { color: var(--danger); background: rgba(255,0,0,0.08); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }

    .loading-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    .loading-spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chart-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    [data-theme="glass"] .chart-container {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
    }
    .chart-container h3 {
      font-size: 14px; font-weight: 600; margin-bottom: 14px;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .chart-wrap { position: relative; max-height: 260px; }

    .comparison-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .comparison-row:last-child { border-bottom: none; }
    .comparison-cat { font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .comparison-values { display: flex; gap: 16px; font-family: var(--font-mono); font-size: 13px; }
    .comparison-diff { font-weight: 600; }
    .comparison-diff.up { color: var(--danger); }
    .comparison-diff.down { color: var(--success); }

    .cat-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .cat-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: var(--bg-input); border-radius: var(--radius-sm);
    }
    .cat-item .cat-name { flex: 1; font-size: 14px; font-weight: 500; }
    .cat-item .cat-remove {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 4px;
    }
    .cat-item .cat-remove:hover { color: var(--danger); }
    .cat-item.default .cat-remove { visibility: hidden; }
    .add-cat-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .add-cat-row input { flex: 1; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-card); border-top: 1px solid var(--border);
      display: flex; justify-content: center; gap: 0;
      padding: 8px 0; padding-bottom: max(8px, env(safe-area-inset-bottom)); z-index: 100;
    }
    [data-theme="glass"] .bottom-nav {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
    }
    [data-theme="cyberpunk"] .bottom-nav {
      border-top-color: var(--accent);
      box-shadow: 0 -2px 20px rgba(0,255,204,0.1);
    }

    .nav-btn {
      background: none; border: none; color: var(--text-muted); font-family: var(--font);
      font-size: 10px; font-weight: 500; padding: 6px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; transition: color 0.2s;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active svg { stroke-width: 2.5; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .budget-set { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .budget-set input { width: 140px; text-align: center; font-family: var(--font-mono); font-weight: 600; }

    .export-section { margin-top: 16px; }
    .section-title {
      font-size: 13px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-secondary); font-weight: 600; margin-bottom: 12px;
    }
    .mt-16 { margin-top: 16px; }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
      padding: 12px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
      z-index: 9999; transition: transform 0.3s ease; font-family: var(--font);
      box-shadow: var(--shadow-lg);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error { background: var(--danger); color: #fff; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="app-container">
    <div class="header">
      <div class="logo"><span>DT</span> Tracker</div>
      <div class="header-right">
        <div class="sync-indicator synced" id="syncStatus">
          <div class="sync-dot"></div>
          <span id="syncText">Synced</span>
        </div>
        <div class="theme-switcher">
          <button onclick="setTheme('light')" title="Light" id="th-light">&#9728;&#65039;</button>
          <button onclick="setTheme('cyberpunk')" title="Cyberpunk" id="th-cyber">&#9889;</button>
          <button onclick="setTheme('glass')" title="Glass" id="th-glass">&#129523;</button>
        </div>
      </div>
    </div>

    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>

    <!-- OVERVIEW -->
    <div class="tab-content active" id="tab-overview">
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">&#128176; Похарчено</div>
          <div class="summary-value" id="totalSpent">0 лв</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">&#128202; Транзакции</div>
          <div class="summary-value" id="totalCount">0</div>
        </div>
        <div class="summary-card full">
          <div class="summary-label">&#127919; Бюджет (<span id="budgetDisplay">3500</span> лв)</div>
          <div style="display:flex;align-items:baseline;gap:10px">
            <div class="summary-value" id="budgetRemaining">3500 лв</div>
            <div style="font-size:13px;color:var(--text-secondary)" id="budgetPercent"></div>
          </div>
          <div class="budget-bar"><div class="budget-bar-fill" id="budgetFill"></div></div>
        </div>
      </div>
      <div class="chart-container">
        <h3>&#128200; По категории</h3>
        <div class="chart-wrap"><canvas id="doughnutChart"></canvas></div>
      </div>
      <div class="chart-container">
        <h3>&#128202; Месец vs Месец</h3>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
    </div>

    <!-- EXPENSES -->
    <div class="tab-content" id="tab-expenses">
      <div class="add-section">
        <h3>&#10133; Добави разход</h3>
        <div class="form-row triple">
          <div class="input-group">
            <label>Сума (лв)</label>
            <input type="number" id="expAmount" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
          </div>
          <div class="input-group">
            <label>Описание</label>
            <input type="text" id="expDesc" placeholder="Какво купи?">
          </div>
          <div class="input-group">
            <label>Дата</label>
            <input type="date" id="expDate">
          </div>
        </div>
        <div class="form-row">
          <div class="input-group">
            <label>Категория</label>
            <select id="expCat"></select>
          </div>
        </div>
        <button class="btn btn-primary" id="addBtn" onclick="addExpense()">&#10133; Добави</button>
      </div>
      <div class="section-title" id="expListTitle">Разходи</div>
      <div class="expense-list" id="expenseList"></div>
    </div>

    <!-- COMPARE -->
    <div class="tab-content" id="tab-compare">
      <div class="chart-container">
        <h3>&#128200; Сравнение с предишен месец</h3>
        <div id="comparisonContent"></div>
      </div>
      <div class="chart-container">
        <h3>&#128202; Тренд (последни 6 месеца)</h3>
        <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="tab-content" id="tab-settings">
      <div class="add-section">
        <h3>&#127919; Месечен бюджет</h3>
        <div class="budget-set">
          <input type="number" id="budgetInput" placeholder="3500" step="100" min="0" inputmode="decimal">
          <button class="btn btn-primary btn-sm" onclick="setBudget()">Запази</button>
        </div>
      </div>
      <div class="add-section mt-16">
        <h3>&#127991;&#65039; Категории</h3>
        <div class="cat-list" id="catList"></div>
        <div class="add-cat-row">
          <input type="text" id="newCatName" placeholder="Нова категория...">
          <button class="btn btn-primary btn-sm" onclick="addCategory()">+</button>
        </div>
      </div>
      <div class="add-section mt-16 export-section">
        <h3>&#128230; Експорт</h3>
        <button class="btn btn-outline" onclick="exportCSV()" style="margin-bottom:10px">&#128196; CSV (текущ месец)</button>
        <button class="btn btn-outline" onclick="exportAllCSV()">&#128196; CSV (всички)</button>
      </div>
      <div class="add-section mt-16">
        <h3>&#128259; Sync</h3>
        <button class="btn btn-outline" onclick="loadFromCloud()" style="margin-bottom:10px">&#9729;&#65039; Зареди от Google Sheets</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('overview')" id="nav-overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Начало</span>
    </button>
    <button class="nav-btn" onclick="switchTab('expenses')" id="nav-expenses">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Разходи</span>
    </button>
    <button class="nav-btn" onclick="switchTab('compare')" id="nav-compare">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Сравнение</span>
    </button>
    <button class="nav-btn" onclick="switchTab('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Настройки</span>
    </button>
  </div>

  <script>
    // ===================== CONFIG =====================
    const API_URL = 'https://script.google.com/macros/s/AKfycbyi4byDVBSLyUhkAJZ4AaaT7d7ukFwjKhiiNGRCo1q6hd-hbzcp3l5IHCmv6AiUQYKdEA/exec';
    const MONTHS_BG = ['Януари','Февруари','Март','Април','Май','Юни','Юли','Август','Септември','Октомври','Ноември','Декември'];
    const DEFAULT_CATS = [
      { id: 'food', name: 'Храна / Хранителни', icon: '🍕', color: '--cat-food', default: true },
      { id: 'car', name: 'Кола', icon: '⛽', color: '--cat-car', default: true },
      { id: 'bills', name: 'Сметки', icon: '🏠', color: '--cat-bills', default: true },
      { id: 'fun', name: 'Забавления', icon: '🎉', color: '--cat-fun', default: true },
    ];

    let state = { expenses: [], categories: [...DEFAULT_CATS], budget: 3500 };
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let doughnutChart, barChart, trendChart;
    let isLoading = false;

    // ===================== API CALLS =====================
    function apiCall(params) {
      return new Promise((resolve, reject) => {
        const cbName = '_jsonp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        const timeout = setTimeout(() => {
          cleanup();
          setSyncStatus('error');
          reject(new Error('Timeout'));
        }, 20000);

        function cleanup() {
          clearTimeout(timeout);
          delete window[cbName];
          const s = document.getElementById(cbName);
          if (s) s.remove();
        }

        window[cbName] = function(data) {
          cleanup();
          if (data && data.error) {
            setSyncStatus('error');
            reject(new Error(data.error));
          } else {
            setSyncStatus('synced');
            resolve(data);
          }
        };

        setSyncStatus('syncing');
        const qs = Object.entries(params).map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
        const script = document.createElement('script');
        script.id = cbName;
        script.src = API_URL + '?' + qs + '&callback=' + cbName;
        script.onerror = () => {
          cleanup();
          setSyncStatus('error');
          reject(new Error('Network error'));
        };
        document.head.appendChild(script);
      });
    }

    function setSyncStatus(status) {
      const el = document.getElementById('syncStatus');
      const txt = document.getElementById('syncText');
      el.className = 'sync-indicator ' + status;
      txt.textContent = status === 'syncing' ? 'Syncing...' : status === 'synced' ? 'Synced' : 'Offline';
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===================== CLOUD OPS =====================
    async function loadFromCloud() {
      if (isLoading) return;
      isLoading = true;
      renderLoadingState();
      try {
        const [expData, catData, budgetData] = await Promise.all([
          apiCall({ action: 'get' }),
          apiCall({ action: 'getCategories' }),
          apiCall({ action: 'getBudget' })
        ]);
        state.expenses = expData.expenses || [];
        if (catData.categories) state.categories = catData.categories;
        if (budgetData.budget) state.budget = parseFloat(budgetData.budget);
        saveLocal();
        showToast('Заредено от Google Sheets!');
      } catch (err) {
        showToast('Грешка при зареждане!', 'error');
        loadLocal();
      }
      isLoading = false;
      render();
    }

    async function addExpenseToCloud(expense) {
      try {
        await apiCall({ action: 'add', data: JSON.stringify(expense) });
      } catch (err) {
        showToast('Запазено локално, sync failed', 'error');
      }
    }

    async function deleteExpenseFromCloud(row) {
      try {
        await apiCall({ action: 'delete', row: row });
      } catch (err) {
        showToast('Изтрито локално, sync failed', 'error');
      }
    }

    async function saveBudgetToCloud(budget) {
      try {
        await apiCall({ action: 'saveBudget', budget: budget });
      } catch (err) { console.error(err); }
    }

    async function saveCategoriesToCloud(cats) {
      try {
        await apiCall({ action: 'saveCategories', data: JSON.stringify(cats) });
      } catch (err) { console.error(err); }
    }

    // ===================== LOCAL STORAGE =====================
    function saveLocal() {
      localStorage.setItem('dt_tracker_state', JSON.stringify(state));
    }
    function loadLocal() {
      try {
        const s = JSON.parse(localStorage.getItem('dt_tracker_state'));
        if (s && s.expenses) { state = s; return true; }
      } catch(e) {}
      return false;
    }

    // ===================== THEME =====================
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('dt_theme', t);
      document.querySelectorAll('.theme-switcher button').forEach(b => b.classList.remove('active'));
      document.getElementById('th-' + (t === 'cyberpunk' ? 'cyber' : t)).classList.add('active');
      const colors = { light: '#f5f5f7', cyberpunk: '#0a0a0f', glass: '#dde0e8' };
      document.querySelector('meta[name="theme-color"]').content = colors[t] || colors.light;
      setTimeout(renderCharts, 100);
    }

    // ===================== MONTH NAV =====================
    function changeMonth(dir) {
      currentMonth += dir;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      render();
    }
    function monthKey(m, y) { return `${y}-${String(m+1).padStart(2,'0')}`; }
    function currentKey() { return monthKey(currentMonth, currentYear); }
    function getMonthExpenses(m, y) {
      const key = monthKey(m, y);
      return state.expenses.filter(e => e.date && e.date.startsWith(key));
    }

    // ===================== CATEGORIES =====================
    function getCatColor(catId) {
      const cat = state.categories.find(c => c.id === catId);
      return cat ? `var(${cat.color})` : 'var(--cat-custom)';
    }
    function getCatColorRaw(catId) {
      const s = getComputedStyle(document.documentElement);
      const cat = state.categories.find(c => c.id === catId);
      return s.getPropertyValue(cat ? cat.color : '--cat-custom').trim();
    }
    function getCatName(catId) {
      const cat = state.categories.find(c => c.id === catId);
      return cat ? cat.name : catId;
    }

    function renderCatSelect() {
      document.getElementById('expCat').innerHTML = state.categories.map(c =>
        `<option value="${c.id}">${c.icon || '📁'} ${c.name}</option>`
      ).join('');
    }

    function renderCatList() {
      document.getElementById('catList').innerHTML = state.categories.map(c => `
        <div class="cat-item ${c.default ? 'default' : ''}">
          <div class="cat-dot" style="background:var(${c.color})"></div>
          <span class="cat-name">${c.icon || '📁'} ${c.name}</span>
          <button class="cat-remove" onclick="removeCategory('${c.id}')" title="Премахни">&times;</button>
        </div>
      `).join('');
    }

    async function addCategory() {
      const input = document.getElementById('newCatName');
      const name = input.value.trim();
      if (!name) return;
      state.categories.push({ id: 'custom_' + Date.now(), name, icon: '📁', color: '--cat-custom', default: false });
      input.value = '';
      saveLocal();
      renderCatSelect();
      renderCatList();
      await saveCategoriesToCloud(state.categories);
      showToast('Категория добавена!');
    }

    async function removeCategory(id) {
      state.categories = state.categories.filter(c => c.id !== id);
      saveLocal();
      renderCatSelect();
      renderCatList();
      await saveCategoriesToCloud(state.categories);
    }

    // ===================== EXPENSES =====================
    async function addExpense() {
      const amount = parseFloat(document.getElementById('expAmount').value);
      const desc = document.getElementById('expDesc').value.trim();
      const date = document.getElementById('expDate').value;
      const cat = document.getElementById('expCat').value;
      if (!amount || amount <= 0) return shakeEl('expAmount');
      if (!desc) return shakeEl('expDesc');
      if (!date) return shakeEl('expDate');

      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      btn.textContent = 'Запазване...';

      const expense = { amount, desc, date, cat };
      state.expenses.push({ ...expense, id: Date.now(), row: null });
      state.expenses.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      saveLocal();

      const d = new Date(date);
      currentMonth = d.getMonth();
      currentYear = d.getFullYear();
      render();

      document.getElementById('expAmount').value = '';
      document.getElementById('expDesc').value = '';

      await addExpenseToCloud(expense);

      // Reload to get correct row numbers
      try {
        const data = await apiCall({ action: 'get' });
        state.expenses = data.expenses || [];
        saveLocal();
        render();
      } catch(e) {}

      btn.disabled = false;
      btn.innerHTML = '&#10133; Добави';
      showToast('Разход добавен!');
    }

    async function deleteExpense(row, index) {
      if (!confirm('Изтрий този разход?')) return;

      if (row) {
        state.expenses = state.expenses.filter(e => e.row !== row);
        saveLocal();
        render();
        await deleteExpenseFromCloud(row);
        // Reload to fix row numbers
        try {
          const data = await apiCall({ action: 'get' });
          state.expenses = data.expenses || [];
          saveLocal();
          render();
        } catch(e) {}
      } else {
        state.expenses.splice(index, 1);
        saveLocal();
        render();
      }
      showToast('Разход изтрит!');
    }

    function shakeEl(id) {
      const el = document.getElementById(id);
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'shake 0.4s ease';
      el.focus();
    }

    // ===================== BUDGET =====================
    async function setBudget() {
      const v = parseFloat(document.getElementById('budgetInput').value);
      if (!v || v <= 0) return;
      state.budget = v;
      saveLocal();
      render();
      await saveBudgetToCloud(v);
      showToast('Бюджет запазен!');
    }

    // ===================== EXPORT =====================
    function expensesToCSV(expenses) {
      const rows = [['Дата','Описание','Категория','Сума (лв)']];
      expenses.forEach(e => rows.push([e.date, e.desc, getCatName(e.cat), e.amount.toFixed(2)]));
      return rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    }
    function downloadCSV(csv, filename) {
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }
    function exportCSV() {
      const exps = getMonthExpenses(currentMonth, currentYear);
      if (!exps.length) return showToast('Няма разходи за този месец!', 'error');
      downloadCSV(expensesToCSV(exps), `razkhodi_${currentKey()}.csv`);
    }
    function exportAllCSV() {
      if (!state.expenses.length) return showToast('Няма разходи!', 'error');
      downloadCSV(expensesToCSV(state.expenses), 'razkhodi_all.csv');
    }

    // ===================== TABS =====================
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('nav-' + tab).classList.add('active');
      if (tab === 'compare') renderComparison();
      if (tab === 'overview') setTimeout(renderCharts, 50);
    }

    // ===================== RENDER =====================
    function renderLoadingState() {
      document.getElementById('expenseList').innerHTML = `
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>Зареждане от Google Sheets...</p>
        </div>`;
    }

    function render() {
      document.getElementById('monthLabel').textContent = `${MONTHS_BG[currentMonth]} ${currentYear}`;
      const today = new Date();
      if (currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
        document.getElementById('expDate').value = today.toISOString().slice(0, 10);
      } else {
        document.getElementById('expDate').value = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
      }

      const exps = getMonthExpenses(currentMonth, currentYear);
      const total = exps.reduce((s, e) => s + e.amount, 0);

      document.getElementById('totalSpent').textContent = total.toFixed(2) + ' лв';
      document.getElementById('totalCount').textContent = exps.length;
      document.getElementById('budgetDisplay').textContent = state.budget;
      document.getElementById('budgetInput').placeholder = state.budget;

      const remaining = state.budget - total;
      const remEl = document.getElementById('budgetRemaining');
      remEl.textContent = remaining.toFixed(2) + ' лв';
      remEl.className = 'summary-value ' + (remaining < 0 ? 'danger' : 'success');

      const pct = Math.min((total / state.budget) * 100, 100);
      document.getElementById('budgetPercent').textContent = `${pct.toFixed(0)}% използвани`;
      const fill = document.getElementById('budgetFill');
      fill.style.width = pct + '%';
      fill.style.background = pct > 90 ? 'var(--danger)' : pct > 70 ? 'var(--warning)' : 'var(--success)';

      const listEl = document.getElementById('expenseList');
      document.getElementById('expListTitle').textContent = `Разходи (${exps.length})`;
      if (exps.length === 0) {
        listEl.innerHTML = `<div class="empty-state"><div class="emoji">&#128184;</div><p>Няма разходи за ${MONTHS_BG[currentMonth]}.<br>Добави първия си разход!</p></div>`;
      } else {
        listEl.innerHTML = exps.map((e, i) => `
          <div class="expense-item">
            <div class="cat-dot" style="background:${getCatColor(e.cat)}"></div>
            <div class="expense-info">
              <div class="expense-desc">${esc(e.desc)}</div>
              <div class="expense-meta">
                <span>${getCatName(e.cat)}</span>
                <span>${formatDate(e.date)}</span>
              </div>
            </div>
            <div class="expense-amount">${e.amount.toFixed(2)} лв</div>
            <button class="expense-delete" onclick="deleteExpense(${e.row || 'null'}, ${state.expenses.indexOf(e)})" title="Изтрий">&times;</button>
          </div>
        `).join('');
      }

      renderCatSelect();
      renderCatList();
      renderCharts();
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function formatDate(d) {
      if (!d) return '';
      const [y, m, day] = d.split('-');
      return `${day}.${m}`;
    }

    // ===================== CHARTS =====================
    function renderCharts() {
      const exps = getMonthExpenses(currentMonth, currentYear);
      const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
      const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--chart-grid').trim();

      const catTotals = {};
      state.categories.forEach(c => catTotals[c.id] = 0);
      exps.forEach(e => { catTotals[e.cat] = (catTotals[e.cat] || 0) + e.amount; });
      const activeCats = Object.entries(catTotals).filter(([, v]) => v > 0);

      if (doughnutChart) doughnutChart.destroy();
      doughnutChart = new Chart(document.getElementById('doughnutChart').getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: activeCats.map(([id]) => getCatName(id)),
          datasets: [{
            data: activeCats.map(([, v]) => v),
            backgroundColor: activeCats.map(([id]) => getCatColorRaw(id)),
            borderWidth: 0, hoverOffset: 8
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: true, cutout: '65%',
          plugins: {
            legend: { position: 'bottom', labels: { color: textColor, padding: 12, font: { size: 12 } } },
            tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed.toFixed(2)} лв` } }
          }
        }
      });

      const barLabels = [], barData = [];
      for (let i = 2; i >= 0; i--) {
        let m = currentMonth - i, y = currentYear;
        if (m < 0) { m += 12; y--; }
        barLabels.push(MONTHS_BG[m].slice(0, 3));
        barData.push(getMonthExpenses(m, y).reduce((s, e) => s + e.amount, 0));
      }
      if (barChart) barChart.destroy();
      barChart = new Chart(document.getElementById('barChart').getContext('2d'), {
        type: 'bar',
        data: {
          labels: barLabels,
          datasets: [{ data: barData, backgroundColor: [getCatColorRaw('bills'), getCatColorRaw('fun'), getCatColorRaw('food')], borderRadius: 8, barThickness: 40 }]
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(2) + ' лв' } } },
          scales: {
            y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11 } } },
            x: { grid: { display: false }, ticks: { color: textColor, font: { size: 12, weight: 500 } } }
          }
        }
      });
    }

    // ===================== COMPARISON =====================
    function renderComparison() {
      let pm = currentMonth - 1, py = currentYear;
      if (pm < 0) { pm = 11; py--; }
      const currExps = getMonthExpenses(currentMonth, currentYear);
      const prevExps = getMonthExpenses(pm, py);
      const currTotal = currExps.reduce((s, e) => s + e.amount, 0);
      const prevTotal = prevExps.reduce((s, e) => s + e.amount, 0);

      let html = `
        <div class="comparison-row" style="font-weight:700;border-bottom:2px solid var(--border)">
          <span>Категория</span>
          <div class="comparison-values">
            <span style="width:70px;text-align:right">${MONTHS_BG[pm].slice(0,3)}</span>
            <span style="width:70px;text-align:right">${MONTHS_BG[currentMonth].slice(0,3)}</span>
            <span style="width:60px;text-align:right">+/-</span>
          </div>
        </div>`;
      state.categories.forEach(cat => {
        const prev = prevExps.filter(e => e.cat === cat.id).reduce((s, e) => s + e.amount, 0);
        const curr = currExps.filter(e => e.cat === cat.id).reduce((s, e) => s + e.amount, 0);
        const diff = curr - prev;
        if (prev === 0 && curr === 0) return;
        html += `
          <div class="comparison-row">
            <div class="comparison-cat"><div class="cat-dot" style="background:var(${cat.color})"></div>${cat.icon||''} ${cat.name}</div>
            <div class="comparison-values">
              <span style="width:70px;text-align:right">${prev.toFixed(0)}</span>
              <span style="width:70px;text-align:right">${curr.toFixed(0)}</span>
              <span class="comparison-diff ${diff>0?'up':diff<0?'down':''}" style="width:60px;text-align:right">${diff>0?'+':''}${diff.toFixed(0)}</span>
            </div>
          </div>`;
      });
      const totalDiff = currTotal - prevTotal;
      html += `
        <div class="comparison-row" style="font-weight:700;border-top:2px solid var(--border);margin-top:4px;padding-top:12px">
          <span>ОБЩО</span>
          <div class="comparison-values">
            <span style="width:70px;text-align:right">${prevTotal.toFixed(0)}</span>
            <span style="width:70px;text-align:right">${currTotal.toFixed(0)}</span>
            <span class="comparison-diff ${totalDiff>0?'up':totalDiff<0?'down':''}" style="width:60px;text-align:right">${totalDiff>0?'+':''}${totalDiff.toFixed(0)}</span>
          </div>
        </div>`;
      document.getElementById('comparisonContent').innerHTML = html;

      const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
      const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--chart-grid').trim();
      const tLabels = [], tData = [];
      for (let i = 5; i >= 0; i--) {
        let m = currentMonth - i, y = currentYear;
        while (m < 0) { m += 12; y--; }
        tLabels.push(MONTHS_BG[m].slice(0, 3));
        tData.push(getMonthExpenses(m, y).reduce((s, e) => s + e.amount, 0));
      }
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(document.getElementById('trendChart').getContext('2d'), {
        type: 'line',
        data: {
          labels: tLabels,
          datasets: [{ data: tData, borderColor: getCatColorRaw('fun'), backgroundColor: getCatColorRaw('fun') + '22', fill: true, tension: 0.4, pointRadius: 5, pointHoverRadius: 8 }]
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(2) + ' лв' } } },
          scales: {
            y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11 } } },
            x: { grid: { display: false }, ticks: { color: textColor, font: { size: 12, weight: 500 } } }
          }
        }
      });
    }

    // ===================== SHAKE ANIM =====================
    const ss = document.createElement('style');
    ss.textContent = `@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}`;
    document.head.appendChild(ss);

    // ===================== INIT =====================
    setTheme(localStorage.getItem('dt_theme') || 'cyberpunk');

    // Load local first for instant UI, then sync from cloud
    if (loadLocal()) {
      render();
    }
    loadFromCloud();
  </script>
</body>
</html>
